<svg width="1800" height="1200" viewBox="0 0 1800 1200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
<title id="title">Anatomy of an Adaptive Skill</title>
<desc id="desc">Diagram explaining that an Adaptive Skill contains When to Use, Core Moves, Activation Triggers, Optional Modules, Expected Output, Verification, and Handoff Signals.</desc>
<style>
.title{font:700 54px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#111827}.subtitle{font:400 25px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#4B5563}.skill{font:700 44px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#111827}.section{font:700 26px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#111827}.small{font:400 19px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#4B5563}.small-soft{font:400 19px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#6B7280}.bold{font:700 19px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.num{font:700 26px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
</style>
<rect width="1800" height="1200" fill="#F7F8FA"/>
<text x="90" y="122" class="title">Anatomy of an Adaptive Skill</text>
<text x="92" y="185" class="subtitle">A small execution asset with stable core moves, optional depth, triggers, and reviewable outputs.</text>
<rect x="145" y="255" width="1510" height="790" rx="36" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
<rect x="195" y="303" width="140" height="42" rx="21" fill="#DBEAFE"/>
<text x="217" y="330" class="bold" fill="#2563EB">SKILL.md</text>
<text x="195" y="403" class="skill">feature-planning</text>
<text x="195" y="455" class="small">Turn vague intent into an executable, bounded, and reviewable slice.</text>
<line x1="900" y1="505" x2="900" y2="960" stroke="#D1D5DB" stroke-width="3"/>
<circle cx="900" cy="550" r="8" fill="#2563EB"/><circle cx="900" cy="660" r="8" fill="#2563EB"/><circle cx="900" cy="770" r="8" fill="#2563EB"/><circle cx="900" cy="880" r="8" fill="#2563EB"/>
<text x="745" y="500" class="bold" fill="#6B7280">select</text><text x="928" y="610" class="bold" fill="#6B7280">adapt</text><text x="750" y="830" class="bold" fill="#6B7280">produce</text><text x="928" y="940" class="bold" fill="#6B7280">close</text>
<rect x="200" y="515" width="600" height="138" rx="24" fill="#FAFAFA" stroke="#E5E7EB"/>
<rect x="224" y="543" width="48" height="48" rx="24" fill="#EDE9FE"/><text x="248" y="576" text-anchor="middle" class="num" fill="#7C3AED">1</text>
<text x="292" y="575" class="section">When to Use / When NOT to Use</text><text x="292" y="608" class="small">Reject weak fits before the skill creates ceremony.</text><text x="292" y="636" class="small">Start from the task, not from the catalog.</text>
<rect x="200" y="670" width="600" height="138" rx="24" fill="#FAFAFA" stroke="#E5E7EB"/>
<rect x="224" y="698" width="48" height="48" rx="24" fill="#DBEAFE"/><text x="248" y="731" text-anchor="middle" class="num" fill="#2563EB">2</text>
<text x="292" y="730" class="section">Core Moves</text><text x="292" y="763" class="small">Three to five durable moves that should almost</text><text x="292" y="791" class="small">always happen. Not a full procedure tree.</text>
<rect x="200" y="825" width="600" height="138" rx="24" fill="#FAFAFA" stroke="#E5E7EB"/>
<rect x="224" y="853" width="48" height="48" rx="24" fill="#D1FAE5"/><text x="248" y="886" text-anchor="middle" class="num" fill="#059669">3</text>
<text x="292" y="885" class="section">Expected Output</text><text x="292" y="918" class="small">A concrete artifact: plan, checklist, diagnosis,</text><text x="292" y="946" class="small">brief, gate, handoff note, or recommendation.</text>
<rect x="975" y="515" width="600" height="138" rx="24" fill="#FAFAFA" stroke="#E5E7EB"/>
<rect x="999" y="543" width="48" height="48" rx="24" fill="#FEF3C7"/><text x="1023" y="576" text-anchor="middle" class="num" fill="#D97706">4</text>
<text x="1067" y="575" class="section">Activation Triggers</text><text x="1067" y="608" class="small">Natural-language cues that select depth: high risk,</text><text x="1067" y="636" class="small">cross-function work, unclear proof, missing rollback.</text>
<rect x="975" y="670" width="600" height="138" rx="24" fill="#FAFAFA" stroke="#E5E7EB"/>
<rect x="999" y="698" width="48" height="48" rx="24" fill="#DBEAFE"/><text x="1023" y="731" text-anchor="middle" class="num" fill="#2563EB">5</text>
<text x="1067" y="730" class="section">Optional Modules</text><text x="1067" y="763" class="small">Contextual blocks such as risk review, stakeholder</text><text x="1067" y="791" class="small">alignment, coverage gap, or accessibility lens.</text>
<rect x="975" y="825" width="600" height="138" rx="24" fill="#FAFAFA" stroke="#E5E7EB"/>
<rect x="999" y="853" width="48" height="48" rx="24" fill="#D1FAE5"/><text x="1023" y="886" text-anchor="middle" class="num" fill="#059669">6</text>
<text x="1067" y="885" class="section">Verification + Handoff</text><text x="1067" y="918" class="small">Check closure quality, surface limits, and decide</text><text x="1067" y="946" class="small">whether to finish, escalate, or create an observation.</text>
<rect x="195" y="973" width="1410" height="50" rx="25" fill="#EEF2FF"/>
<text x="219" y="1005" class="bold" fill="#3730A3">Rule of thumb: use the smallest skill that improves clarity, proof, handoff, or decision quality.</text>
<text x="90" y="1142" class="small-soft">Each skill is stable enough to be repeatable and modular enough to adapt to context.</text>
</svg>