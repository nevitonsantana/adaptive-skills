<svg width="1800" height="1100" viewBox="0 0 1800 1100" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
<title id="title">Adaptive Skills in the AI work stack</title>
<desc id="desc">Diagram showing AletheIA as macro orchestration, Adaptive Skills as the micro execution layer, and runtimes such as Codex and Claude Code as consumer projections.</desc>
<style>
  .title{font:700 54px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#111827}.subtitle{font:400 25px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#4B5563}.card-title{font:700 42px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#111827}.tag{font:700 20px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.item{font:400 20px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.small{font:400 20px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#6B7280}.small-bold{font:700 20px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
</style>
<rect width="1800" height="1100" fill="#F7F8FA"/>
<text x="90" y="122" class="title">Adaptive Skills in the AI work stack</text>
<text x="92" y="185" class="subtitle">A reusable micro-execution layer between governance/orchestration and runtime-specific agents.</text>
<rect x="1180" y="205" width="440" height="56" rx="28" fill="#EEF2FF"/>
<text x="1208" y="241" class="small-bold" fill="#3730A3">role ≠ skill ≠ runtime adapter</text>
<rect x="180" y="300" width="1440" height="180" rx="30" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
<rect x="218" y="336" width="260" height="46" rx="23" fill="#EDE9FE"/>
<text x="242" y="365" class="tag" fill="#7C3AED">Macro orchestration</text>
<text x="218" y="448" class="card-title">AletheIA</text>
<rect x="680" y="355" width="180" height="48" rx="24" fill="#EDE9FE"/><text x="770" y="385" class="item" fill="#7C3AED" text-anchor="middle">framing</text>
<rect x="900" y="355" width="180" height="48" rx="24" fill="#EDE9FE"/><text x="990" y="385" class="item" fill="#7C3AED" text-anchor="middle">readiness gates</text>
<rect x="1120" y="355" width="180" height="48" rx="24" fill="#EDE9FE"/><text x="1210" y="385" class="item" fill="#7C3AED" text-anchor="middle">handoffs</text>
<rect x="1340" y="355" width="180" height="48" rx="24" fill="#EDE9FE"/><text x="1430" y="385" class="item" fill="#7C3AED" text-anchor="middle">continuity</text>
<rect x="1560" y="355" width="180" height="48" rx="24" fill="#EDE9FE"/><text x="1650" y="385" class="item" fill="#7C3AED" text-anchor="middle">learning</text>
<line x1="900" y1="490" x2="900" y2="545" stroke="#D1D5DB" stroke-width="4"/><path d="M900 545 L882 533 L882 557 Z" fill="#D1D5DB"/><text x="1055" y="525" class="small" text-anchor="middle">consumes / coordinates</text>
<rect x="180" y="555" width="1440" height="210" rx="30" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
<rect x="218" y="591" width="260" height="46" rx="23" fill="#DBEAFE"/>
<text x="242" y="620" class="tag" fill="#2563EB">Micro execution layer</text>
<text x="218" y="703" class="card-title">Adaptive Skills</text>
<rect x="680" y="610" width="180" height="48" rx="24" fill="#DBEAFE"/><text x="770" y="640" class="item" fill="#2563EB" text-anchor="middle">skills</text>
<rect x="900" y="610" width="180" height="48" rx="24" fill="#DBEAFE"/><text x="990" y="640" class="item" fill="#2563EB" text-anchor="middle">modules</text>
<rect x="1120" y="610" width="180" height="48" rx="24" fill="#DBEAFE"/><text x="1210" y="640" class="item" fill="#2563EB" text-anchor="middle">triggers</text>
<rect x="1340" y="610" width="180" height="48" rx="24" fill="#DBEAFE"/><text x="1430" y="640" class="item" fill="#2563EB" text-anchor="middle">verification</text>
<rect x="1560" y="610" width="180" height="48" rx="24" fill="#DBEAFE"/><text x="1650" y="640" class="item" fill="#2563EB" text-anchor="middle">handoff signals</text>
<line x1="900" y1="775" x2="900" y2="830" stroke="#D1D5DB" stroke-width="4"/><path d="M900 830 L882 818 L882 842 Z" fill="#D1D5DB"/><text x="1035" y="810" class="small" text-anchor="middle">projects into</text>
<rect x="180" y="840" width="1440" height="150" rx="30" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
<rect x="218" y="876" width="260" height="46" rx="23" fill="#D1FAE5"/>
<text x="242" y="905" class="tag" fill="#059669">Consumer projection</text>
<text x="218" y="988" class="card-title">Runtimes</text>
<rect x="680" y="895" width="180" height="48" rx="24" fill="#D1FAE5"/><text x="770" y="925" class="item" fill="#059669" text-anchor="middle">Codex</text>
<rect x="945" y="895" width="180" height="48" rx="24" fill="#D1FAE5"/><text x="1035" y="925" class="item" fill="#059669" text-anchor="middle">Claude Code</text>
<rect x="1210" y="895" width="180" height="48" rx="24" fill="#D1FAE5"/><text x="1300" y="925" class="item" fill="#059669" text-anchor="middle">other AI agents</text>
<rect x="1475" y="895" width="180" height="48" rx="24" fill="#D1FAE5"/><text x="1565" y="925" class="item" fill="#059669" text-anchor="middle">project-local setup</text>
<text x="90" y="1052" class="small">Adaptive Skills keeps reusable execution discipline independent from macro governance and runtime mechanics.</text>
</svg>
