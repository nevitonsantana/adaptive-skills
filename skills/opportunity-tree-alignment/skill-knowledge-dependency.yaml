# Skill Knowledge Dependency Declaration — opportunity-tree-alignment
#
# Declares TYPES of knowledge the skill needs, never specific source ids.
# See: ../../../aletheia/docs/contracts/skill-knowledge-dependency-contract.md

skill: opportunity-tree-alignment
version: 0.1.0

knowledge_dependencies:

  strategic_framework:
    required: false
    accepted_types:
      - proprietary_framework
      - product_strategy
      - business_design_framework
    min_authority: interpretive
    preferred_retrieval_mode: capsule_first
    notes: |
      The value lens used to weigh opportunities. Generic mode uses the seven
      generic levers when unsatisfied and marks the output mode: generic.

  operating_model:
    required_when:
      - roadmap_decision
      - prioritization_decision
    accepted_types:
      - operating_model
    preferred_retrieval_mode: capsule_first
    notes: |
      Governs how prioritization and sequencing decisions are made in the org.

fallback_behavior:
  missing_required_source: stop_and_request_source
  missing_optional_source: continue_with_assumption_marker
  restricted_source: request_authorized_context_pack
  conflicting_sources: apply_source_precedence_policy

output_requirements:
  cite_satisfying_packs: true
  cite_unsatisfied_slots: true
  list_active_restrictions: true
  list_conflicts_and_resolutions: true
