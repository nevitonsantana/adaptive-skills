name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  validate-skills:
    name: Validate Skills (frontmatter + 11 required sections + forbidden refs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Run validate_skills.py
        run: python3 scripts/validate_skills.py

  validate-skills-ref:
    name: agentskills.io conformance (skills-ref)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install skills-ref (pinned; ships the `agentskills` CLI)
        run: pip install 'skills-ref==0.1.0'
      - name: Validate generic skills
        run: agentskills validate skills/
      - name: Validate domain-pack skills
        run: agentskills validate domain-packs/crisis-management/skills/

  validate-evolution:
    name: Validate Evolution (observations + proposals + reviews)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Run validate_evolution.py
        run: python3 scripts/validate_evolution.py

  projection-status:
    name: Projection Status Report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Run report_projection_status.py
        run: python3 scripts/report_projection_status.py

  projection-dry-run:
    name: Projection Dry-Run (Codex)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Run project_to_codex.py --all --dry-run
        run: python3 scripts/project_to_codex.py --all --dry-run

  projection-check:
    name: Projection Drift Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Run project_to_codex.py --check
        run: python3 scripts/project_to_codex.py --check

  quality-gate:
    name: Quality Gate (aggregator)
    runs-on: ubuntu-latest
    needs:
      - validate-skills
      - validate-skills-ref
      - validate-evolution
      - projection-status
      - projection-dry-run
      - projection-check
    steps:
      - name: All required checks passed
        run: echo "Quality Gate passed."
