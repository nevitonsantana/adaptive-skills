name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  validate-system-state:
    name: Validate SYSTEM_STATE (authority + budget + refs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Run validate_system_state.py
        run: python3 scripts/validate_system_state.py

  validate-skills:
    name: Validate Skills (frontmatter + 11 required sections + forbidden refs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Run validate_skills.py
        run: python3 scripts/validate_skills.py

  validate-skills-ref:
    name: agentskills.io conformance (skills-ref)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install skills-ref (pinned; ships the `agentskills` CLI)
        run: pip install 'skills-ref==0.1.0'
      - name: Validate generic skills (one folder per invocation)
        run: |
          set -e
          for d in skills/*/; do
            echo "::group::agentskills validate $d"
            agentskills validate "$d"
            echo "::endgroup::"
          done
      - name: Validate domain-pack skills (one folder per invocation)
        run: |
          set -e
          for d in domain-packs/crisis-management/skills/*/; do
            echo "::group::agentskills validate $d"
            agentskills validate "$d"
            echo "::endgroup::"
          done

  validate-evolution:
    name: Validate Evolution (observations + proposals + reviews)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Run validate_evolution.py
        run: python3 scripts/validate_evolution.py

  validate-evolution-experiments:
    name: Validate Evolution Experiments (validation cases + experiments)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Run validate_evolution_experiments.py
        run: python3 scripts/validate_evolution_experiments.py

  validate-knowledge-deps:
    name: Validate Knowledge Dependencies (skill manifests vs contract)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install PyYAML
        run: pip install 'pyyaml==6.0.2'
      - name: Run validate_knowledge_deps.py
        run: python3 scripts/validate_knowledge_deps.py

  validate-harness-requirements:
    name: Validate Harness Requirements (per-skill declarations)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install PyYAML
        run: pip install 'pyyaml==6.0.2'
      - name: Run validate_harness_requirements.py
        run: python3 scripts/validate_harness_requirements.py

  validate-capabilities:
    name: Validate Capabilities (catalog + profiles + routes + relationships)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Run validate_capabilities.py
        run: python3 scripts/validate_capabilities.py

  projection-status:
    name: Projection Status Report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Run report_projection_status.py
        run: python3 scripts/report_projection_status.py

  projection-dry-run:
    name: Projection Dry-Run (Codex)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Run project_to_codex.py --all --dry-run
        run: python3 scripts/project_to_codex.py --all --dry-run

  projection-check:
    name: Projection Drift Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Run project_to_codex.py --check
        run: python3 scripts/project_to_codex.py --check

  quality-gate:
    name: Quality Gate (aggregator)
    runs-on: ubuntu-latest
    needs:
      - validate-system-state
      - validate-skills
      - validate-skills-ref
      - validate-evolution
      - validate-evolution-experiments
      - validate-knowledge-deps
      - validate-harness-requirements
      - validate-capabilities
      - projection-status
      - projection-dry-run
      - projection-check
    steps:
      - name: All required checks passed
        run: echo "Quality Gate passed."
