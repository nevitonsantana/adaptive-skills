name: Docs Pages Manual Publish

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Blume docs for GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'pnpm'
      - uses: actions/configure-pages@v6
      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile
      - name: Validate docs before publishing artifact
        run: pnpm run docs:validate
      - name: Build docs for Pages
        run: pnpm run docs:build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: apps/docs/dist

  deploy:
    name: Deploy Blume docs to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v5
